{{- $c := .site.company -}}
<section class="company-section white-bg position-relative overflow-hidden" id="{{ $c.id }}">
  <h2 class="title text-center">{{ $c.title }}</h2>
  <div class="container">
    <div class="row align-items-stretch">
      <div class="col-md-6 align-self-center pb-4 pb-md-5 pb-lg-0">
        <div class="py-lg-5" id="compDescription">
          <div class="pb-md-3 paragraph">
            {{- range $c.paragraphs }}
            <p>{{ . | safeHTML }}</p>
            {{- end }}
          </div>
          <a href="{{ $c.cta.url }}" class="common-btn">{{ $c.cta.text }} <img src="{{ "icons/arrow-right.svg" | relURL }}" class="img-fluid" alt=""></a>
        </div>
      </div>
      <div class="col-md-6">
        <div class="compy-box mt-4 my-md-0 position-relative">
          <img src="{{ $c.image | relURL }}" class="img-fluid" alt="{{ $c.imageAlt }}">
        </div>
      </div>
    </div>
  </div>
</section>
