  author = 'The Moon Design Studio'
  instagram = '@themoon_design'
  instagramUrl = 'https://www.instagram.com/themoon_design?utm_source=qr&igsh=czI4Zjh5bTZpcXU='
  address = 'г. Москва, МЦК Ботанический Сад, ул. Вильгельма Пика, д.11'
  ogImage = '/images/interior-25.jpg'
  twitterCard = 'summary_large_image'
  themeColor = '#1c1c1c'

[languages.ru]
  label = 'Русский'
  weight = 1
  title = 'The Moon — Дизайн-студия интерьеров'

[outputs]
  home = ['HTML', 'RSS']

[markup]
