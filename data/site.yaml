company:
  title: "о нас"
  id: "about"
  paragraphs:
    - "Мы проектируем и комплектуем квартиры, загородные дома, отели и офисы от эконом до премиум‑класса."
    - "Специализируемся на создании интерьеров, которые актуальны вне времени, с помощью индивидуального проектирования мебели из качественных материалов."
    - "От разработки концепции дизайна до контроля качества отделочных работ — мы сопровождаем каждый этап проекта, чтобы достичь идеального результата."
  cta:
    text: "Обсудить проект"
    url: "#contact"
  image: "/images/works/company.jpg"
  imageAlt: "Интерьер The Moon"

designers:
  title: "команда"
  id: "team"
  lead: "Ваш проект под контролем профессионалов"
  paragraphs:
    - "<strong>Главный дизайнер</strong> — разрабатывает концепцию дизайна интерьера, координирует все этапы проекта, следит за сроками и бюджетом."
    - "<strong>Инженер-проектировщик</strong> — отвечает за техническую грамотность решений и проработку чертежей в соответствии с концепцией дизайна."
    - "<strong>Комплектатор</strong> — находит качественную мебель и материалы на китайских фабриках с лучшими ценами, организует поставку и установку на объекте."
    - "<strong>Прораб</strong> — со своей строительной бригадой обеспечивает идеальное качество отделочных работ и монтажа."
  cta:
    text: "Связаться с нами"
    url: "#contact"
  members:
    - image: "/images/pers_1.jpg"
      alt: "Главный дизайнер"
      role: "team1"
    - image: "/images/pers_2.jpg"
      alt: "Инженер-проектировщик"
      role: "team2"
    - image: "/images/pers_3.jpg"
      alt: "Комплектатор"
      role: "team3"

projects:
  title: "услуги"
  id: "services"
  content: "От разработки концепции дизайна до контроля качества отделочных работ — мы сопровождаем каждый этап проекта, чтобы достичь идеального результата. При объёмах от 150&nbsp;м² цена договорная."
  cta:
    text: "Заказать консультацию"
    url: "#contact"
  images:
    - image: "/images/works/apt-01-1.jpg"
      alt: "Апартаменты — кухня"
      class: "pbox-left"
    - image: "/images/works/hotel-01.jpg"
      alt: "Отель"
      class: "pbox-right"
    - image: "/images/works/apt-01-2.jpg"
      alt: "Апартаменты — спальня"
      class: "pbox-left"
  sidebar: "/images/works/apt-02-1.jpg"
  services:
    - number: "01"
      title: "Концепция дизайна"
      text: "Создание общего видения проекта с учётом пожеланий клиента. От 2000&nbsp;₽/м²."
    - number: "02"
      title: "Рабочая документация"
      text: "Полный комплект рабочей документации для производства мебели и строительных работ. От 3000&nbsp;₽/м²."
    - number: "03"
      title: "Комплектация объекта"
      text: "Поставка мебели, сантехники, освещения и отделочных материалов напрямую с китайских фабрик без посреднических наценок. От 2000&nbsp;₽/м²."
    - number: "04"
      title: "Строительно-монтажные работы"
      text: "Организация СМР любой сложности и контроль качества на всех этапах. От 50&nbsp;000&nbsp;₽/м²."

testimonials:
  title: "преимущества"
  id: "advantages"
  items:
    - name: "Интерьеры вне времени"
      text: "Лаконичные пропорции, спокойные текстуры, натуральные экологически чистые и качественные материалы, проверенные временем. Интерьер выглядит достойно многие годы."
      image: "/images/works/works-intro-1.jpg"
      reverse: false
    - name: "Полный цикл услуг"
      text: "От концепции и рабочей документации до комплектации и строительно-монтажных работ — все этапы под контролем одной команды."
      image: "/images/works/apt-02-2.jpg"
      reverse: true
    - name: "Прямые поставки"
      text: "Работаем напрямую с фабриками Китая без посреднических наценок. Конкурентоспособные цены на проектирование и комплектацию."
      image: "/images/works/hotel-07.jpg"
      reverse: false

