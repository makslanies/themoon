offices:
  title: "офисы"
  id: "offices"
  lead: "Функциональные офисные пространства"
  description: "Мы разрабатываем функциональные офисные помещения, которые работают как единый механизм, объединяя бизнес-процессы, эргономику и современный дизайн."
  pillars:
    - title: "Оптимизация бизнес-процессов"
      text: "Каждый квадратный метр подчиняется логике вашего бизнеса. Мы анализируем маршруты движения сотрудников, точки коммуникации и сценарии взаимодействия отделов."
    - title: "Эргономика как основа продуктивности"
      text: "Проектируем пространство, заботясь о здоровье и комфорте людей: продуманная планировка, правильное освещение и акустический комфорт."
    - title: "Дизайн, отражающий культуру компании"
      text: "Чистые линии, сбалансированные цветовые решения и качественные материалы создают атмосферу, в которой приятно находиться."
  collages:
    - label: "Офисные интерьеры"
      images:
        - image: "/images/works/office-01.jpg"
          alt: "Офис"
        - image: "/images/works/office-03.jpg"
          alt: "Офис"
        - image: "/images/works/office-05.jpg"
          alt: "Офис"
        - image: "/images/works/office-07.jpg"
          alt: "Офис"
  cta:
    text: "Обсудить офисный проект"
    url: "#contact"

